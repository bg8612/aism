<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AISM Admin</title>
  <style>
    body { font-family: "Segoe UI", Arial, sans-serif; margin: 24px; background: #f6f8fb; color: #1d2433; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .card { background: #fff; border: 1px solid #dbe2ef; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
    input, textarea, select { width: 100%; padding: 8px; margin: 4px 0 10px; border: 1px solid #cfd8ea; border-radius: 8px; }
    textarea { min-height: 90px; }
    button, .btn { background: #1447e6; color: #fff; border: none; border-radius: 8px; padding: 8px 12px; cursor: pointer; text-decoration: none; display: inline-block; }
    .btn-secondary { background: #55627a; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #e6eaf2; padding: 8px; text-align: left; vertical-align: top; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .nav a { margin-right: 8px; }
  </style>
</head>
<body>
<div class="wrap">
  {% block content %}{% endblock %}
</div>
</body>
</html>
