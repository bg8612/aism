{% extends "base.html" %}
{% block content %}
<div class="card">
  <h1>Боты</h1>
  <a class="btn" href="/admin/bots/new">Создать бота</a>
  <table>
    <thead><tr><th>ID</th><th>Название</th><th>Активен</th><th>Telegram</th><th>Действия</th></tr></thead>
    <tbody>
      {% for row in rows %}
      <tr>
        <td>{{ row.bot.id }}</td>
        <td>{{ row.bot.name }}</td>
        <td>{{ row.bot.is_active }}</td>
        <td>{{ row.channel.bot_username if row.channel else "—" }}</td>
        <td><a class="btn btn-secondary" href="/admin/bots/{{ row.bot.id }}">Открыть</a></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
