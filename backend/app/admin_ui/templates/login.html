{% extends "base.html" %}
{% block title %}Вход — AISM Admin{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
  <div class="ui-card p-6">
    <h1 class="text-xl font-semibold text-slate-900">Вход в админ-панель</h1>
    <p class="text-sm text-slate-500 mt-1">Введите ADMIN API TOKEN для доступа.</p>

    {% if error %}
      <div class="mt-4 rounded-md border border-red-200 bg-red-50 text-red-700 text-sm px-3 py-2">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/login" class="mt-5 space-y-4">
      <div>
        <label class="ui-label" for="token">ADMIN API TOKEN</label>
        <input id="token" type="password" name="token" class="ui-input" required />
      </div>
      <button type="submit" class="ui-btn-primary w-full">Войти</button>
    </form>
  </div>
</div>
{% endblock %}
