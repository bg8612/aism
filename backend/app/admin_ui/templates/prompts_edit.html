{% extends "base.html" %}
{% block title %}Промпты — Бот #{{ bot.id }}{% endblock %}
{% block content %}
<div class="space-y-4">
  <div class="flex flex-wrap items-center gap-2">
    <a class="ui-btn-secondary" href="/admin/bots/{{ bot.id }}">К боту</a>
    <a class="ui-btn-secondary" href="/admin/bots/{{ bot.id }}/conversations">Диалоги</a>
  </div>

  <div class="ui-card p-6">
    <h1 class="text-xl font-semibold text-slate-900">Промпты бота #{{ bot.id }}</h1>
    <p class="text-sm text-slate-500 mt-1">Индивидуальные промпты для AI-логики этого бота.</p>

    <div class="space-y-5 mt-5">
      {% for item in prompts %}
      <form method="post" action="/admin/prompts/{{ item.id }}" class="border rounded-xl p-4 space-y-3 bg-white">
        <div class="flex items-center justify-between gap-4">
          <div>
            <div class="text-xs text-slate-500 uppercase tracking-wide">{{ item.prompt_key }}</div>
            <input class="ui-input mt-1" name="title" value="{{ item.title }}" required />
          </div>
          <label class="inline-flex items-center gap-2 text-sm text-slate-700">
            <input type="checkbox" name="is_active" {% if item.is_active %}checked{% endif %}>
            <span>Активен</span>
          </label>
        </div>
        <textarea class="ui-input min-h-[120px]" name="content" required>{{ item.content }}</textarea>
        <button type="submit" class="ui-btn-primary">Сохранить</button>
      </form>
      {% endfor %}
    </div>
  </div>
</div>
{% endblock %}
