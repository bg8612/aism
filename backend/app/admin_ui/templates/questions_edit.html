{% extends "base.html" %}
{% block content %}
<div class="card"><a class="btn btn-secondary" href="/admin/bots/{{ bot.id }}">Назад к боту</a></div>
<div class="card">
  <h1>Вопросы: {{ bot.name }}</h1>
  <form method="post" action="/admin/bots/{{ bot.id }}/questions">
    <label>Field</label>
    <select name="field_id">
      {% for field in fields %}
      <option value="{{ field.id }}">{{ field.field_key }} — {{ field.label }}</option>
      {% endfor %}
    </select>
    <label>question_text</label><textarea name="question_text" required></textarea>
    <div class="row">
      <div><label>order_index</label><input type="number" name="order_index" value="0"></div>
      <div><label>required</label><input type="checkbox" name="is_required" checked></div>
    </div>
    <button type="submit">Добавить вопрос</button>
  </form>
</div>
<div class="card">
  <table><thead><tr><th>ID</th><th>field_id</th><th>text</th><th>active</th><th></th></tr></thead><tbody>
    {% for item in questions %}
    <tr>
      <td>{{ item.id }}</td><td>{{ item.field_id }}</td><td>{{ item.question_text }}</td><td>{{ item.is_active }}</td>
      <td>{% if item.is_active %}<form method="post" action="/admin/questions/{{ item.id }}/disable"><button type="submit">Отключить</button></form>{% endif %}</td>
    </tr>
    {% endfor %}
  </tbody></table>
</div>
{% endblock %}
